name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-linux
            os: ubuntu-latest
            cross: false
          - target: aarch64-linux
            os: ubuntu-latest
            cross: true
          - target: x86_64-macos
            os: macos-15-intel
            cross: false
          - target: aarch64-macos
            os: macos-latest
            cross: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build
        run: |
          BUILD_ARGS="-Doptimize=ReleaseSafe -Dversion=${GITHUB_REF_NAME#v}"
          if [ "${{ matrix.cross }}" = "true" ]; then
            BUILD_ARGS="-Dtarget=${{ matrix.target }} $BUILD_ARGS"
          fi
          zig build $BUILD_ARGS

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DIR="termscope-${VERSION}-${{ matrix.target }}"
          mkdir -p "$DIR/man"
          cp zig-out/bin/termscope "$DIR/"
          cp man/* "$DIR/man/"
          cp SKILL.md "$DIR/"
          [ -f LICENSE ] && cp LICENSE "$DIR/" || true
          tar czf "$DIR.tar.gz" "$DIR"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: termscope-${{ matrix.target }}
          path: "*.tar.gz"

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.tar.gz"
          generate_release_notes: true
